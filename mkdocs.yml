site_name: LPJ EOSIM
site_url: https://lpj-eosim.github.io
repo_url: https://github.com/LPJ-EOSIM/lpj-eosim.github.io

nav:
  - Home: index.md
  - Usage:
      - Simulations: simulations.md
  - WIEMIP:
      - Overview: wiemip.md
      - "base-ctrl carbon pools & fluxes": wiemip/base_ctrl_carbon.md
      - "base-ctrl carbon & N₂O summary": wiemip/base_ctrl_carbon_summary.md
      - "1pctCO2 baseline vs nofire": wiemip/1pct_baseline_vs_nofire.md
  - Benchmarks:
      - "Incorporating a nitrogen cycle in LPJ-EOSIM": results/pr-412.md
      - "SPITFIRE integration - pr 421": results/spitfire.md
      - "SPITFIRE WVPD fire-danger variants": results/spitfire_wvpd.md
      - "ERA5 low-latency runs": results/era5.md
      - "Tuning a no-fire permutation to the baseline": results/tuned_nofire.md
  - Publications: publications.md

plugins:
  - search  # Enables site search
  - mkdocstrings  # Generates API docs from docstrings

markdown_extensions:
  - admonition  # Adds note/warning/info boxes
  - toc:  # Table of contents
      permalink: true
      
# Configuration
theme:
  highlightjs: true
  name: 'material'
  repo_url: null 

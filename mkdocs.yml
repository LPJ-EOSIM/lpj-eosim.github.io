site_name: LPJ EOSIM
site_url: https://lpj-eosim.github.io
repo_url: https://github.com/LPJ-EOSIM/lpj-eosim.github.io

nav:
  - Home: index.md
  - Usage:
      - Simulations: simulations.md
  - WIEMIP:
      - Overview: wiemip.md
      - Overshoots:
          - Driver Data: overshoots/driver_data.md
          - LPJ Results: overshoots/lpj_results.md
          - "Soil-C plateau recap": overshoots/soilc_plateau_recap.md
          - "Archive (older futures)": overshoots/archive.md
      - 1pctCO2:
          - "baseline stages vs nofire": 1pctCO2/baseline_vs_nofire.md
          - "baseline vs tuned no_fire (stages)": 1pctCO2/baseline_vs_tuned_nofire_stages.md
          - "baseline vs tuned no_fire+no_Nlim": 1pctCO2/baseline_vs_tuned_nofire_nonlim.md
      - "Drivers: population & N deposition vs WIEMIP": wiemip/overshoot_pop_ndep.md
  - Benchmarks:
      - "Incorporating a nitrogen cycle in LPJ-EOSIM": results/pr-412.md
      - "SPITFIRE integration - pr 421": results/spitfire.md
      - "SPITFIRE WVPD fire-danger variants": results/spitfire_wvpd.md
      - "ERA5 low-latency runs": results/era5.md
      - "Tuning a no-fire permutation to the baseline": results/tuned_nofire.md
  - Publications: publications.md

plugins:
  - search  # Enables site search
  - mkdocstrings  # Generates API docs from docstrings

markdown_extensions:
  - admonition  # Adds note/warning/info boxes
  - toc:  # Table of contents
      permalink: true
      
# Configuration
theme:
  highlightjs: true
  name: 'material'
  repo_url: null 

#! define_regions = /mnt/beegfs/scratch/tc229954e/ilamb_data/regions/GlobalLand.nc

# Active benchmarks: carbon-cycle (biomass, GPP, LAI, NBP, soil C, Reco) + fire
# (burned area). Model variable names come from util/format_ilamb.sh, which
# writes cVeg (<-vegc), cSoil (<-soilc), gpp, lai, nbp, reco, burntArea (<-firef).
# Relationships to disabled confrontations (ET, precip) were removed so ILAMB
# does not warn/skip on missing datasets. Forcings / hydrology / CO2 / Koven
# extended-soil sections remain disabled below (no model var or missing obs).

[h1: Ecosystem and Carbon Cycle]
bgcolor = "#ECFFE6"

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

[h2: Biomass]
variable       = "biomass"
alternate_vars = "cVeg, vegc"
cmap           = "Greens"
weight         = 5
mass_weighting = True

[Saatchi]
source     = "/mnt/beegfs/scratch/tc229954e/ilamb_data/biomass/Saatchi2011/biomass_0.5x0.5.nc"
weight     = 20
table_unit = "Pg"
plot_unit  = "kg m-2"
space_mean = False
skip_rmse  = True

[Thurner]
source     = "/mnt/beegfs/scratch/tc229954e/ilamb_data/biomass/Thurner/biomass_0.5x0.5.nc"
weight     = 20
table_unit = "Pg"
plot_unit  = "kg m-2"
space_mean = False
skip_rmse  = True

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

[h2: Gross Primary Productivity]
variable       = "gpp"
alternate_vars = "mgpp"
cmap           = "Greens"
weight         = 5
mass_weighting = True

[FLUXNET2015]
source     = "/mnt/beegfs/scratch/tc229954e/ilamb_data/gpp/FLUXNET2015/gpp.nc"
weight     = 9
table_unit = "g m-2 d-1"
plot_unit  = "g m-2 d-1"

[FLUXCOM]
source        = "/mnt/beegfs/scratch/tc229954e/ilamb_data/gpp/FLUXCOM/gpp.nc"
weight        = 15
table_unit    = "Pg yr-1"
plot_unit     = "g m-2 d-1"
space_mean    = False
skip_iav      = True

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

[h2: Leaf Area Index]
variable       = "lai"
cmap           = "Greens"
weight         = 3
mass_weighting = True

[AVH15C1]
source        = "/mnt/beegfs/scratch/tc229954e/ilamb_data/lai/AVH15C1/lai.nc"
weight        = 15

[MODIS]
source        = "/mnt/beegfs/scratch/tc229954e/ilamb_data/lai/MODIS/lai_0.5x0.5.nc"
weight        = 15
skip_iav      = True

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

[h2: Global Net Ecosystem Carbon Balance]
variable = "nbp"
weight   = 5
ctype    = "ConfNBP"

[GCP]
source = "/mnt/beegfs/scratch/tc229954e/ilamb_data/nbp/GCP/nbp_1959-2016.nc"
weight = 20

[Hoffman]
source      = "/mnt/beegfs/scratch/tc229954e/ilamb_data/nbp/Hoffman/nbp_1850-2010.nc"
weight      = 20
skip_taylor = True

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

[h2: Ecosystem Respiration]
variable       = "reco"
cmap           = "Oranges"
weight         = 4
mass_weighting = True

[FLUXNET2015]
source     = "/mnt/beegfs/scratch/tc229954e/ilamb_data/reco/FLUXNET2015/reco.nc"
weight     = 6
table_unit = "g m-2 d-1"
plot_unit  = "g m-2 d-1"

[FLUXCOM]
source     = "/mnt/beegfs/scratch/tc229954e/ilamb_data/reco/FLUXCOM/reco.nc"
weight     = 4
table_unit = "Pg yr-1"
plot_unit  = "g m-2 d-1"
space_mean = False
skip_iav   = True

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

[h2: Soil Carbon]
variable       = "cSoilAbove1m"
alternate_vars = "cSoil"
cmap           = "Greens"
weight         = 5
mass_weighting = True

[HWSD]
source     = "/mnt/beegfs/scratch/tc229954e/ilamb_data/cSoil/HWSD/soilc_0.5x0.5.nc"
weight     = 15
table_unit = "Pg"
plot_unit  = "kg m-2"
space_mean = False
skip_rmse  = True

[NCSCDV22]
source     = "/mnt/beegfs/scratch/tc229954e/ilamb_data/cSoil/NCSCDV22/soilc_0.5x0.5.nc"
weight     = 12
table_unit = "Pg"
plot_unit  = "kg m-2"
space_mean = False
skip_rmse  = True

#~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

[h2: Burned Area]
variable   = "burntArea"
cmap       = "Reds"
weight     = 5

[GFED4.1S]
source     = "/mnt/beegfs/scratch/tc229954e/ilamb_data/burntArea/GFED4.1S/burntArea.nc"
weight     = 15
table_unit = "%"
plot_unit  = "%"

###########################################################################
# Disabled sections (kept for reference): CO2 (needs co2.nc), Soil Carbon
# Extended/Koven (needs tas/pr/npp/pet sources), Hydrology (ET uses an
# unproduced mplaceholder; runoff), and Forcings (tas, pr). Re-enable by
# moving them above and ensuring the model variable + obs source exist.
